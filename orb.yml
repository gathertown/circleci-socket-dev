version: 2.1
description: |
    Run Socket.dev checks in CircleCI: policy enforcement via the official Socket CLI (`socket ci`), Socket Firewall Free (`npx sfw`) or Socket Firewall Enterprise (official `sfw` binary plus `SOCKET_API_KEY`), or both. Use `SOCKET_CLI_API_TOKEN` for `socket ci` (see https://docs.socket.dev/docs/create-socket-api-key-for-cicd). Enterprise Firewall uses `SOCKET_API_KEY` with scopes `packages` and `entitlements:list` (see https://docs.socket.dev/docs/socket-firewall-enterprise).
display:
    home_url: https://github.com/gathertown/circleci-socket-dev
    source_url: https://github.com/gathertown/circleci-socket-dev
commands:
    ci:
        description: |
            Run `socket ci` via npx to create a Socket scan and enforce your org security and license policies. Requires `SOCKET_CLI_API_TOKEN` in the job environment.
        parameters:
            app_dir:
                default: .
                description: Working directory for the scan (relative to the checkout root).
                type: string
            auto_manifest:
                default: false
                description: |
                    When true, passes `--autoManifest` so manifests can be generated where supported.
                type: boolean
            cli_version:
                default: latest
                description: Version or dist-tag of the npm `socket` package (e.g. latest, 1.1.84).
                type: string
            extra_args:
                default: ""
                description: Extra arguments appended to the `socket ci` command line.
                type: string
            org_slug:
                default: ""
                description: |
                    If set, exports SOCKET_CLI_ORG_SLUG. Omit to use the default org for the API token.
                type: string
        steps:
            - run:
                command: |
                    set -euo pipefail
                    # Parameters are passed via `environment` on the run step so this file never contains raw
                    # `\<<` from CircleCI (bash would interpret it as a heredoc when used with \<<include()>>).
                    if [ -n "${SOCKET_CI_ORG_SLUG:-}" ]; then
                      export SOCKET_CLI_ORG_SLUG="$SOCKET_CI_ORG_SLUG"
                    fi
                    CLI_VER="${SOCKET_CI_CLI_VERSION:-latest}"
                    AUTO_FLAGS=()
                    case "${SOCKET_CI_AUTO_MANIFEST:-false}" in
                      true | 1 | yes) AUTO_FLAGS+=(--autoManifest) ;;
                    esac
                    # shellcheck disable=SC2086
                    exec npx --yes socket@${CLI_VER} ci "${AUTO_FLAGS[@]}" ${SOCKET_CI_EXTRA_ARGS:-}
                environment:
                    SOCKET_CI_AUTO_MANIFEST: << parameters.auto_manifest >>
                    SOCKET_CI_CLI_VERSION: << parameters.cli_version >>
                    SOCKET_CI_EXTRA_ARGS: << parameters.extra_args >>
                    SOCKET_CI_ORG_SLUG: << parameters.org_slug >>
                name: Socket CI (socket.dev)
                working_directory: << parameters.app_dir >>
    sfw:
        description: |
            Run a package manager command through Socket Firewall. Use `sfw_edition: free` for Socket Firewall Free via the npm `sfw` package (`npx`). Use `sfw_edition: enterprise` for Socket Firewall Enterprise: downloads the official binary from https://github.com/SocketDev/firewall-release and requires `SOCKET_API_KEY` (or a `.sfw.config` file). See https://docs.socket.dev/docs/socket-firewall-enterprise
        parameters:
            app_dir:
                default: .
                description: Working directory for the command (relative to the checkout root).
                type: string
            sfw_command:
                default: yarn install --frozen-lockfile
                description: |
                    Full command after the `sfw` binary (for example `yarn install --frozen-lockfile`, `npm ci`, `pnpm install --frozen-lockfile`).
                type: string
            sfw_config_relative_paths:
                default: false
                description: |
                    When `sfw_edition` is `enterprise`, set `SFW_CONFIG_RELATIVE_PATHS` so `.sfw.config` is resolved from the working directory and parents.
                type: boolean
            sfw_custom_registries:
                default: ""
                description: |
                    When non-empty and `sfw_edition` is `enterprise`, sets `SFW_CUSTOM_REGISTRIES` (comma-separated `kind:host` entries). See Socket Enterprise configuration docs.
                type: string
            sfw_debug:
                default: false
                description: When `sfw_edition` is `enterprise`, sets `SFW_DEBUG=true`.
                type: boolean
            sfw_edition:
                default: free
                description: |
                    `free`: npm `sfw` (Socket Firewall Free). `enterprise`: GitHub release binary (CLI wrapper mode; set `SOCKET_API_KEY` or `.sfw.config`).
                enum:
                    - free
                    - enterprise
                type: enum
            sfw_enterprise_musl:
                default: false
                description: |
                    When `sfw_edition` is `enterprise`, download the musl-linked Linux binary (for example Alpine-like environments). Default uses glibc Linux builds.
                type: boolean
            sfw_enterprise_version:
                default: latest
                description: |
                    GitHub release tag for Socket Firewall Enterprise (for example `1.6.1`), or `latest` to follow the newest release. Ignored when `sfw_edition` is `free`.
                type: string
            sfw_telemetry_disabled:
                default: false
                description: When `sfw_edition` is `enterprise`, sets `SFW_TELEMETRY_DISABLED=true`.
                type: boolean
            sfw_unknown_host_action:
                default: ""
                description: |
                    When non-empty and `sfw_edition` is `enterprise`, sets `SFW_UNKNOWN_HOST_ACTION` (`block`, `warn`, or `ignore`).
                type: string
            sfw_version:
                default: latest
                description: Version or dist-tag of the npm `sfw` package when `sfw_edition` is `free`.
                type: string
        steps:
            - run:
                command: |
                    set -euo pipefail
                    # Orb parameters are passed via the run step `environment` block only — no
                    # `\<< parameters.* >>` in this file (bash would treat `\<<` as a heredoc when
                    # CircleCI substitution does not run as expected inside \<<include()>>).

                    EDITION="${ORB_SFW_EDITION:-free}"
                    if [ "$EDITION" = "enterprise" ]; then
                      if [ -z "${SOCKET_API_KEY:-}" ] && [ ! -f .sfw.config ]; then
                        echo "Socket Firewall Enterprise requires SOCKET_API_KEY in the job environment (recommended: Context) or a .sfw.config file in the app directory." >&2
                        echo "See https://docs.socket.dev/docs/socket-firewall-enterprise-wrapper-mode" >&2
                        exit 1
                      fi
                      if [ "${ORB_SFW_CONFIG_RELATIVE_PATHS:-false}" = "true" ]; then
                        export SFW_CONFIG_RELATIVE_PATHS=true
                      fi
                      if [ -n "${ORB_SFW_CUSTOM_REGISTRIES:-}" ]; then
                        export SFW_CUSTOM_REGISTRIES="${ORB_SFW_CUSTOM_REGISTRIES}"
                      fi
                      if [ -n "${ORB_SFW_UNKNOWN_HOST_ACTION:-}" ]; then
                        export SFW_UNKNOWN_HOST_ACTION="${ORB_SFW_UNKNOWN_HOST_ACTION}"
                      fi
                      if [ "${ORB_SFW_TELEMETRY_DISABLED:-false}" = "true" ]; then
                        export SFW_TELEMETRY_DISABLED=true
                      fi
                      if [ "${ORB_SFW_DEBUG:-false}" = "true" ]; then
                        export SFW_DEBUG=true
                      fi
                      ARCH=$(uname -m)
                      MUSL="${ORB_SFW_ENTERPRISE_MUSL:-false}"
                      if [ "$MUSL" = "true" ]; then
                        case "$ARCH" in
                          x86_64) BIN=sfw-musl-linux-x86_64 ;;
                          aarch64) BIN=sfw-musl-linux-arm64 ;;
                          *)
                            echo "Unsupported CPU architecture for musl Socket Firewall binary: $ARCH" >&2
                            exit 1
                            ;;
                        esac
                      else
                        case "$ARCH" in
                          x86_64) BIN=sfw-linux-x86_64 ;;
                          aarch64) BIN=sfw-linux-arm64 ;;
                          *)
                            echo "Unsupported CPU architecture for Socket Firewall Enterprise Linux binary: $ARCH" >&2
                            exit 1
                            ;;
                        esac
                      fi
                      ENT_VER="${ORB_SFW_ENTERPRISE_VERSION:-latest}"
                      if [ -z "$ENT_VER" ] || [ "$ENT_VER" = "latest" ]; then
                        URL="https://github.com/SocketDev/firewall-release/releases/latest/download/${BIN}"
                      else
                        URL="https://github.com/SocketDev/firewall-release/releases/download/v${ENT_VER}/${BIN}"
                      fi
                      echo "Downloading Socket Firewall Enterprise: ${URL}"
                      curl -fsSL -o /tmp/sfw-enterprise "$URL"
                      chmod +x /tmp/sfw-enterprise
                      # shellcheck disable=SC2086
                      /tmp/sfw-enterprise ${ORB_SFW_COMMAND:?ORB_SFW_COMMAND must be set by the orb (sfw_command parameter)}
                    else
                      SFW_VER="${ORB_SFW_VERSION:-latest}"
                      # shellcheck disable=SC2086
                      npx --yes sfw@${SFW_VER} ${ORB_SFW_COMMAND:?ORB_SFW_COMMAND must be set by the orb (sfw_command parameter)}
                    fi
                environment:
                    ORB_SFW_COMMAND: << parameters.sfw_command >>
                    ORB_SFW_CONFIG_RELATIVE_PATHS: << parameters.sfw_config_relative_paths >>
                    ORB_SFW_CUSTOM_REGISTRIES: << parameters.sfw_custom_registries >>
                    ORB_SFW_DEBUG: << parameters.sfw_debug >>
                    ORB_SFW_EDITION: << parameters.sfw_edition >>
                    ORB_SFW_ENTERPRISE_MUSL: << parameters.sfw_enterprise_musl >>
                    ORB_SFW_ENTERPRISE_VERSION: << parameters.sfw_enterprise_version >>
                    ORB_SFW_TELEMETRY_DISABLED: << parameters.sfw_telemetry_disabled >>
                    ORB_SFW_UNKNOWN_HOST_ACTION: << parameters.sfw_unknown_host_action >>
                    ORB_SFW_VERSION: << parameters.sfw_version >>
                name: Socket Firewall (sfw)
                working_directory: << parameters.app_dir >>
executors:
    default:
        description: |
            This is a sample executor using Docker and Node. If you want to provide a custom environment in your orb, insert your image here. If you do not require an executor, you can simply delete this directory.
        docker:
            - image: cimg/node:<<parameters.tag>>
        parameters:
            tag:
                default: lts
                description: |
                    Pick a specific cimg/node image variant: https://hub.docker.com/r/cimg/node/tags
                type: string
jobs:
    scan:
        description: |
            Check out the repository and run Socket protection according to `mode`: `socket ci` only, Socket Firewall (`sfw`) only, or both (sfw then `socket ci`). For `ci` and `both`, configure `SOCKET_CLI_API_TOKEN` on the project or via a Context.
        executor:
            name: default
            tag: << parameters.node_tag >>
        parameters:
            app_dir:
                default: .
                type: string
            auto_manifest:
                default: false
                type: boolean
            cli_version:
                default: latest
                description: npm `socket` package version or tag for npx.
                type: string
            extra_args:
                default: ""
                type: string
            mode:
                default: ci
                description: |
                    `ci`: run `socket ci` only (requires SOCKET_CLI_API_TOKEN). `sfw`: run the package manager through Socket Firewall (`sfw_edition` selects Free vs Enterprise). `both`: run sfw then `socket ci`.
                enum:
                    - ci
                    - sfw
                    - both
                type: enum
            node_tag:
                default: current
                description: cimg/node tag for the job executor.
                type: string
            org_slug:
                default: ""
                type: string
            resource_class:
                default: medium
                description: |
                    CircleCI resource class (e.g. small, medium, large, xlarge, 2xlarge, arm.medium).
                type: string
            sfw_command:
                default: yarn install --frozen-lockfile
                description: |
                    Command passed to `sfw` (when mode is `sfw` or `both`).
                type: string
            sfw_config_relative_paths:
                default: false
                type: boolean
            sfw_custom_registries:
                default: ""
                type: string
            sfw_debug:
                default: false
                type: boolean
            sfw_edition:
                default: free
                description: |
                    `free`: Socket Firewall Free via npm `npx sfw`. `enterprise`: binary from GitHub releases; requires `SOCKET_API_KEY` or `.sfw.config` (when mode is `sfw` or `both`).
                enum:
                    - free
                    - enterprise
                type: enum
            sfw_enterprise_musl:
                default: false
                description: Use musl Enterprise Linux binary when `sfw_edition` is `enterprise`.
                type: boolean
            sfw_enterprise_version:
                default: latest
                description: |
                    GitHub release tag for Enterprise when `sfw_edition` is `enterprise`, or `latest`.
                type: string
            sfw_telemetry_disabled:
                default: false
                type: boolean
            sfw_unknown_host_action:
                default: ""
                type: string
            sfw_version:
                default: latest
                description: npm `sfw` package version or tag for npx when `sfw_edition` is `free`.
                type: string
        resource_class: << parameters.resource_class >>
        steps:
            - checkout
            - when:
                condition:
                    or:
                        - equal:
                            - << parameters.mode >>
                            - sfw
                        - equal:
                            - << parameters.mode >>
                            - both
                steps:
                    - sfw:
                        app_dir: << parameters.app_dir >>
                        sfw_command: << parameters.sfw_command >>
                        sfw_config_relative_paths: << parameters.sfw_config_relative_paths >>
                        sfw_custom_registries: << parameters.sfw_custom_registries >>
                        sfw_debug: << parameters.sfw_debug >>
                        sfw_edition: << parameters.sfw_edition >>
                        sfw_enterprise_musl: << parameters.sfw_enterprise_musl >>
                        sfw_enterprise_version: << parameters.sfw_enterprise_version >>
                        sfw_telemetry_disabled: << parameters.sfw_telemetry_disabled >>
                        sfw_unknown_host_action: << parameters.sfw_unknown_host_action >>
                        sfw_version: << parameters.sfw_version >>
            - when:
                condition:
                    or:
                        - equal:
                            - << parameters.mode >>
                            - ci
                        - equal:
                            - << parameters.mode >>
                            - both
                steps:
                    - ci:
                        app_dir: << parameters.app_dir >>
                        auto_manifest: << parameters.auto_manifest >>
                        cli_version: << parameters.cli_version >>
                        extra_args: << parameters.extra_args >>
                        org_slug: << parameters.org_slug >>
examples:
    usage-scan-ci-plus-firewall:
        description: |
            Run installs through Socket Firewall then `socket ci`. Set `SOCKET_CLI_API_TOKEN` for the policy scan; `sfw` itself does not require a token.
        usage:
            version: "2.1"
            orbs:
                socket: gathertown/socket@0.0.2
            workflows:
                supply-chain:
                    jobs:
                        - socket/scan:
                            context: socket-dev-credentials
                            mode: both
    usage-scan-firewall-enterprise:
        description: |
            Socket Firewall Enterprise (wrapper mode): binary from GitHub releases, API key via Context. The key must have scopes `packages` and `entitlements:list`. See Enterprise configuration: https://docs.socket.dev/docs/socket-firewall-enterprise-configuration
        usage:
            version: "2.1"
            orbs:
                socket: gathertown/socket@0.0.2
            workflows:
                supply-chain:
                    jobs:
                        - socket/scan:
                            context: socket-firewall-enterprise-credentials
                            mode: sfw
                            sfw_edition: enterprise
    usage-scan-firewall-free:
        description: |
            Socket Firewall Free only: proxy package manager traffic without `socket ci` (no API token).
        usage:
            version: "2.1"
            orbs:
                socket: gathertown/socket@0.0.2
            workflows:
                install:
                    jobs:
                        - socket/scan:
                            mode: sfw
                            sfw_command: yarn install --frozen-lockfile
    usage-scan-socket-ci:
        description: |
            Run the `scan` job with credentials supplied through a Context.
        usage:
            version: "2.1"
            orbs:
                socket: gathertown/socket@0.0.2
            workflows:
                supply-chain:
                    jobs:
                        - socket/scan:
                            context: socket-dev-credentials

