version: 2.1

description: >
  Run Socket.dev checks in CircleCI: policy enforcement via the official Socket CLI
  (`socket ci`), Socket Firewall Free (`npx sfw`) or Socket Firewall Enterprise
  (official `sfw` binary plus `SOCKET_API_KEY`), or both. Use `SOCKET_CLI_API_TOKEN`
  for `socket ci` (see https://docs.socket.dev/docs/create-socket-api-key-for-cicd).
  Enterprise Firewall uses `SOCKET_API_KEY` with scopes `packages` and `entitlements:list`
  (see https://docs.socket.dev/docs/socket-firewall-enterprise).

display:
  # Product: https://socket.dev — registry review checks home_url is reachable from CI;
  # use this repo URL so orb-tools/review (RC007) passes.
  home_url: "https://github.com/gathertown/circleci-socket-dev"
  source_url: "https://github.com/gathertown/circleci-socket-dev"
