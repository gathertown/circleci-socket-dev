description: >
  Run `socket ci` via npx to create a Socket scan and enforce your org security
  and license policies. Requires `SOCKET_CLI_API_TOKEN` in the job environment.

parameters:
  cli_version:
    type: string
    default: latest
    description: Version or dist-tag of the npm `socket` package (e.g. latest, 1.1.84).
  auto_manifest:
    type: boolean
    default: false
    description: >
      When true, passes `--autoManifest` so manifests can be generated where supported.
  app_dir:
    type: string
    default: .
    description: Working directory for the scan (relative to the checkout root).
  org_slug:
    type: string
    default: ""
    description: >
      If set, exports SOCKET_CLI_ORG_SLUG. Omit to use the default org for the API token.
  extra_args:
    type: string
    default: ""
    description: Extra arguments appended to the `socket ci` command line.

steps:
  - run:
      name: Socket CI (socket.dev)
      working_directory: << parameters.app_dir >>
      command: |
        set -euo pipefail
        if [ -n "<< parameters.org_slug >>" ]; then
          export SOCKET_CLI_ORG_SLUG="<< parameters.org_slug >>"
        fi
        npx --yes socket@<< parameters.cli_version >> ci<<# parameters.auto_manifest>> --autoManifest<</ parameters.auto_manifest>> << parameters.extra_args >>
