description: >
  Run a package manager command through Socket Firewall. Use `sfw_edition: free` for
  Socket Firewall Free via the npm `sfw` package (`npx`). Use `sfw_edition: enterprise`
  for Socket Firewall Enterprise: downloads the official binary from
  https://github.com/SocketDev/firewall-release and requires `SOCKET_API_KEY` (or a
  `.sfw.config` file). See https://docs.socket.dev/docs/socket-firewall-enterprise

parameters:
  sfw_edition:
    type: enum
    enum: [free, enterprise]
    default: free
    description: >
      `free`: npm `sfw` (Socket Firewall Free). `enterprise`: GitHub release binary
      (CLI wrapper mode; set `SOCKET_API_KEY` or `.sfw.config`).
  sfw_version:
    type: string
    default: latest
    description: Version or dist-tag of the npm `sfw` package when `sfw_edition` is `free`.
  sfw_enterprise_version:
    type: string
    default: latest
    description: >
      GitHub release tag for Socket Firewall Enterprise (for example `1.6.1`), or
      `latest` to follow the newest release. Ignored when `sfw_edition` is `free`.
  sfw_enterprise_musl:
    type: boolean
    default: false
    description: >
      When `sfw_edition` is `enterprise`, download the musl-linked Linux binary
      (for example Alpine-like environments). Default uses glibc Linux builds.
  app_dir:
    type: string
    default: .
    description: Working directory for the command (relative to the checkout root).
  sfw_command:
    type: string
    default: "yarn install --frozen-lockfile"
    description: >
      Full command after the `sfw` binary (for example `yarn install --frozen-lockfile`,
      `npm ci`, `pnpm install --frozen-lockfile`).
  sfw_config_relative_paths:
    type: boolean
    default: false
    description: >
      When `sfw_edition` is `enterprise`, set `SFW_CONFIG_RELATIVE_PATHS` so `.sfw.config`
      is resolved from the working directory and parents.
  sfw_custom_registries:
    type: string
    default: ""
    description: >
      When non-empty and `sfw_edition` is `enterprise`, sets `SFW_CUSTOM_REGISTRIES`
      (comma-separated `kind:host` entries). See Socket Enterprise configuration docs.
  sfw_unknown_host_action:
    type: string
    default: ""
    description: >
      When non-empty and `sfw_edition` is `enterprise`, sets `SFW_UNKNOWN_HOST_ACTION`
      (`block`, `warn`, or `ignore`).
  sfw_telemetry_disabled:
    type: boolean
    default: false
    description: When `sfw_edition` is `enterprise`, sets `SFW_TELEMETRY_DISABLED=true`.
  sfw_debug:
    type: boolean
    default: false
    description: When `sfw_edition` is `enterprise`, sets `SFW_DEBUG=true`.

steps:
  - run:
      name: Socket Firewall (sfw)
      working_directory: << parameters.app_dir >>
      command: <<include(scripts/run_sfw.sh)>>
