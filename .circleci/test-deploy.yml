version: 2.1
orbs:
  orb-tools: circleci/orb-tools@12.3

filters: &filters
  tags:
    only: /.*/

release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

jobs:
  # Pack + validate orb source (no orb injection required; `circleci config validate` works locally).
  command-test:
    docker:
      - image: circleci/circleci-cli:0.1.26646
    steps:
      - checkout
      - run:
          name: Pack and validate orb source
          command: |
            set -euo pipefail
            circleci orb pack --skip-update-check src > /tmp/orb.yml
            circleci orb validate --skip-update-check /tmp/orb.yml

workflows:
  test-deploy:
    jobs:
      - command-test:
          filters: *filters
      - orb-tools/pack:
          filters: *release-filters
      - orb-tools/publish:
          orb_name: gathertown/socket
          vcs_type: << pipeline.project.type >>
          pub_type: production
          requires:
            - orb-tools/pack
            - command-test
          context: orb-publishing
          filters: *release-filters
